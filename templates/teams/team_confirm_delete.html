{% extends 'base.html' %}

{% block title %}Delete Team - AssetGuard{% endblock %}

{% block page_title %}Delete Team{% endblock %}

{% block content %}
<div class="page-title">Delete Team</div>

<div class="row">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body">
                <p class="text-danger"><strong>Are you sure you want to delete this team?</strong></p>
                <p>Team: <strong>{{ object.team_name }}</strong></p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
                    <a href="{% url 'teams:team_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Change Password - AssetGuard{% endblock %}

{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="page-title">Change Password</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_old_password" class="form-label">Current Password</label>
                        <input type="password" name="old_password" id="id_old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">New Password</label>
                        <input type="password" name="new_password1" id="id_new_password1" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password2" class="form-label">Confirm Password</label>
                        <input type="password" name="new_password2" id="id_new_password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Change Password</button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
